<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10151d" />
    <title>RoguelikeFansBand Rewrite — Vertical Slice</title>
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div>
          <p class="eyebrow">RFB REWRITE / ORIGINAL TEST WORLD</p>
          <h1>渲染与规则分层验证场</h1>
        </div>
        <div class="header-actions">
          <button id="replay-button" type="button">导出诊断回放</button>
          <button id="save-button" type="button">导出存档</button>
          <label class="file-button">
            载入存档
            <input id="load-input" type="file" accept=".rfbsave,application/octet-stream" />
          </label>
        </div>
      </header>

      <main class="game-layout">
        <section class="map-panel" aria-label="游戏地图">
          <div class="panel-heading">
            <span>PIXIJS MAP LAYER</span>
            <span id="connection-status" class="status-pill">正在启动核心</span>
          </div>
          <div id="map-host" class="map-host"></div>
          <div class="input-toolbar">
            <label for="input-preset">
              移动键位
              <select id="input-preset">
                <option value="numpad">小键盘</option>
                <option value="vi">Vi 键位（HJKL）</option>
                <option value="wasd">WASD</option>
              </select>
            </label>
            <label for="tileset-preset">
              地图外观
              <select id="tileset-preset">
                <option value="ascii">ASCII Glyph Atlas</option>
                <option value="image">原创图片 Tileset</option>
              </select>
            </label>
            <p id="controls-help" class="controls"></p>
          </div>
        </section>

        <aside class="ui-column">
          <section class="status-panel" aria-labelledby="status-title">
            <div class="panel-heading">
              <span id="status-title">HTML STATUS LAYER</span>
            </div>
            <dl class="status-grid">
              <div><dt>回合</dt><dd id="turn-value">0</dd></div>
              <div><dt>生命</dt><dd id="hp-value">--</dd></div>
              <div><dt>位置</dt><dd id="position-value">--</dd></div>
              <div><dt>状态哈希</dt><dd id="hash-value">--</dd></div>
            </dl>
          </section>

          <section class="message-panel" aria-labelledby="message-title">
            <div class="panel-heading">
              <span id="message-title">HTML MESSAGE LAYER</span>
              <button id="clear-messages" class="quiet-button" type="button">清空</button>
            </div>
            <ol id="message-list" class="message-list" aria-live="polite"></ol>
          </section>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
