<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10151d" />
    <title data-l10n-id="app-title"></title>
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div>
          <p class="eyebrow" data-l10n-id="app-eyebrow"></p>
          <h1 data-l10n-id="app-heading"></h1>
        </div>
        <div class="header-actions">
          <button id="replay-button" type="button" data-l10n-id="action-export-replay"></button>
          <button id="save-button" type="button" data-l10n-id="action-export-save"></button>
          <label class="file-button">
            <span data-l10n-id="action-load-save"></span>
            <input id="load-input" type="file" accept=".rfbsave,application/octet-stream" />
          </label>
        </div>
      </header>

      <main class="game-layout">
        <section class="map-panel" data-l10n-aria-label="map-aria-label">
          <div class="panel-heading">
            <span data-l10n-id="panel-map-title"></span>
            <span id="connection-status" class="status-pill"></span>
          </div>
          <div id="map-host" class="map-host"></div>
          <div class="input-toolbar">
            <label for="input-preset">
              <span data-l10n-id="settings-input-label"></span>
              <select id="input-preset">
                <option value="numpad" data-l10n-id="input-preset-numpad"></option>
                <option value="vi" data-l10n-id="input-preset-vi"></option>
                <option value="wasd" data-l10n-id="input-preset-wasd"></option>
              </select>
            </label>
            <label for="tileset-preset">
              <span data-l10n-id="settings-tileset-label"></span>
              <select id="tileset-preset">
                <option value="ascii" data-l10n-id="tileset-ascii"></option>
                <option value="image" data-l10n-id="tileset-image"></option>
              </select>
            </label>
            <label for="camera-mode">
              <span data-l10n-id="settings-camera-label"></span>
              <select id="camera-mode">
                <option value="full-map" data-l10n-id="camera-full-map"></option>
                <option value="player-centered" data-l10n-id="camera-player-centered"></option>
              </select>
            </label>
            <label for="zoom-level">
              <span data-l10n-id="settings-zoom-label"></span>
              <select id="zoom-level">
                <option value="0.75" data-l10n-id="zoom-75"></option>
                <option value="1" data-l10n-id="zoom-100"></option>
                <option value="1.25" data-l10n-id="zoom-125"></option>
                <option value="1.5" data-l10n-id="zoom-150"></option>
                <option value="2" data-l10n-id="zoom-200"></option>
              </select>
            </label>
            <label for="language-select">
              <span data-l10n-id="settings-language-label"></span>
              <select id="language-select">
                <option value="en-US" data-l10n-id="language-name-en-us"></option>
                <option value="zh-CN" data-l10n-id="language-name-zh-cn"></option>
              </select>
            </label>
            <p id="controls-help" class="controls"></p>
          </div>
        </section>

        <aside class="ui-column">
          <section class="status-panel" aria-labelledby="status-title">
            <div class="panel-heading">
              <span id="status-title" data-l10n-id="panel-status-title"></span>
            </div>
            <dl class="status-grid">
              <div><dt data-l10n-id="status-turn"></dt><dd id="turn-value">0</dd></div>
              <div><dt data-l10n-id="status-health"></dt><dd id="hp-value">--</dd></div>
              <div><dt data-l10n-id="status-attack"></dt><dd id="attack-value">--</dd></div>
              <div><dt data-l10n-id="status-defense"></dt><dd id="defense-value">--</dd></div>
              <div><dt data-l10n-id="status-position"></dt><dd id="position-value">--</dd></div>
              <div><dt data-l10n-id="status-hash"></dt><dd id="hash-value">--</dd></div>
            </dl>
          </section>

          <section class="inventory-panel" aria-labelledby="inventory-title">
            <div class="panel-heading">
              <span id="inventory-title" data-l10n-id="panel-inventory-title"></span>
              <span id="inventory-count"></span>
            </div>
            <div class="inventory-actions">
              <span id="inventory-selection-count"></span>
              <div class="inventory-action-controls">
                <label class="inventory-drop-quantity" for="inventory-drop-quantity">
                  <span data-l10n-id="inventory-drop-quantity-label"></span>
                  <input id="inventory-drop-quantity" type="number" min="1" step="1" inputmode="numeric" />
                </label>
                <button id="inventory-equip" type="button" data-l10n-id="action-inventory-equip"></button>
                <button id="inventory-drop" type="button" data-l10n-id="action-inventory-drop"></button>
              </div>
            </div>
            <ul id="inventory-list" class="inventory-list" aria-live="polite"></ul>
            <div class="equipment-heading" data-l10n-id="panel-equipment-title"></div>
            <ul id="equipment-list" class="equipment-list" aria-live="polite"></ul>
          </section>

          <section class="save-panel" aria-labelledby="native-save-title">
            <div class="panel-heading">
              <span id="native-save-title" data-l10n-id="panel-native-save-title"></span>
              <button id="native-save-refresh" class="quiet-button" type="button" data-l10n-id="action-native-save-refresh"></button>
            </div>
            <div class="native-save-create">
              <label for="native-save-name" data-l10n-id="native-save-name-label"></label>
              <div>
                <input id="native-save-name" type="text" maxlength="80" />
                <button id="native-save-create" type="button" data-l10n-id="action-native-save-create"></button>
              </div>
            </div>
            <ul id="native-save-list" class="native-save-list" aria-live="polite"></ul>
          </section>

          <section class="message-panel" aria-labelledby="message-title">
            <div class="panel-heading">
              <span id="message-title" data-l10n-id="panel-message-title"></span>
              <button id="clear-messages" class="quiet-button" type="button" data-l10n-id="action-clear-messages"></button>
            </div>
            <ol id="message-list" class="message-list" aria-live="polite"></ol>
          </section>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
