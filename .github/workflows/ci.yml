name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo run -p rfb-protocol --features bindings --bin generate-bindings -- --check
      - run: cargo run -p rfb-content --features schemas --bin generate-content-schemas -- --check
      - run: cargo run -p rfb-content --bin rfb-contentc -- verify-source packs/rfb-demo-original
      - run: cargo check --workspace --exclude rfb-tauri --all-targets
      - run: cargo clippy --workspace --exclude rfb-tauri --all-targets -- -D warnings
      - run: cargo test --workspace --exclude rfb-tauri

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build:ui

  tauri-windows:
    name: Tauri Windows build
    runs-on: windows-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run build -- --no-bundle
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        with:
          name: tauri-render-profile
          path: test-results/render-profile.json
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: tauri-e2e-failure
          path: test-results/

  tauri-android:
    name: Tauri Android ARM64 build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager --licenses > /dev/null
      - run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0" "ndk;29.0.13846066"
      - run: echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.13846066" >> "$GITHUB_ENV"
      - run: npm ci
      - run: npm run android:build:debug
      - uses: actions/upload-artifact@v4
        with:
          name: rfb-android-arm64-debug
          path: web/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
